<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My AI Assistant</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background-color: #f4f7f6; 
        }
        .sidebar { 
            width: 260px; 
            background-color: #2c3e50; 
            color: white; 
            padding: 20px; 
        }
        .chat-container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
        }
        .chat-window { 
            flex: 1; 
            padding: 30px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
        }
        .message { 
            max-width: 60%; 
            padding: 15px; 
            border-radius: 10px; 
            line-height: 1.5;
        }
        .user-message { 
            align-self: flex-end; 
            background-color: #3498db; 
            color: white; 
            border-bottom-right-radius: 0;
        }
        .ai-message { 
            align-self: flex-start; 
            background-color: white; 
            color: #333; 
            border-bottom-left-radius: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .input-area { 
            padding: 20px; 
            background-color: white; 
            border-top: 1px solid #ddd; 
            display: flex; 
            gap: 10px; 
        }
        input[type="text"] { 
            flex: 1; 
            padding: 15px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            font-size: 16px;
            outline: none;
        }
        button { 
            padding: 15px 30px; 
            background-color: #2ecc71; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-size: 16px;
            cursor: pointer; 
            font-weight: bold;
        }
        button:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>
    
    <div class="sidebar">
        <h2>My Chats</h2>
        <p>📝 Session History</p>
    </div>

    <div class="chat-container">
        
        <div class="chat-window">
            
            {% for message in chat_messages %}
                
                {% if message.sender == 'user' %}
                    <div class="message user-message">
                        {{ message.text }}
                    </div>
                {% else %}
                    <div class="message ai-message">
                        {{ message.text }}
                    </div>
                {% endif %}

            {% empty %}
                <div class="message ai-message">
                    Hello! I am your AI assistant. We have no history yet!
                </div>
            {% endfor %}

       <form method="POST" class="input-area">
            {% csrf_token %}
            <input type="text" name="user_input" placeholder="Type your message here..." required>
            <button type="submit">Send</button>
        </form>

    </div>

</body>
</html>
